<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galaxia de Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Georgia', cursive, sans-serif;
            touch-action: none;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
            padding: 20px;
            overflow: hidden;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0033 0%, #330066 50%, #1a0033 100%);
            border: 3px solid #ff69b4;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.5);
            animation: slideIn 0.4s ease;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .modal-content::-webkit-scrollbar {
            display: none;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #ff69b4;
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
        }

        .modal-close:hover {
            transform: rotate(90deg) scale(1.2);
        }

        .modal-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.3);
            background: #2a0050;
        }

        .modal-text {
            color: #fff;
            font-size: 1.2rem;
            line-height: 1.8;
            text-align: center;
            font-style: italic;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
            min-height: 80px;
        }

        .modal-heart {
            text-align: center;
            font-size: 3rem;
            margin-top: 20px;
            animation: pulse 1.5s ease infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { 
                transform: scale(0.5) translateY(50px);
                opacity: 0;
            }
            to { 
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .pointer {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close" id="modal-close">&times;</span>
            <img class="modal-image" id="modal-image" src="" alt="Love">
            <div class="modal-text" id="modal-text"></div>
            <div class="modal-heart">💖</div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ===== ИНИЦИАЛИЗАЦИЯ СЦЕНЫ =====
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(
            75, 
            window.innerWidth / window.innerHeight, 
            0.1, 
            1000
        );
        camera.position.z = 50;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Оптимизация
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // ===== УПРАВЛЕНИЕ КАМЕРОЙ =====
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 200;
        controls.enabled = false; // Отключено до конца анимации

        // ===== RAYCASTER =====
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // ===== 15 УНИКАЛЬНЫХ КОМПЛИМЕНТОВ =====
        const allImageData = [
            {
                image: 'images/photo_1.jpg', 
                letter: 'images/photo_1.jpg',
                text: 'Ты - моя вселенная, мое солнце и луна. Каждый момент с тобой - это чудо! 💕'
            }, 
            {
                image: 'images/photo_2.jpg',
                letter: 'images/photo_2.jpg',
                text: 'В твоих глазах я вижу целый мир, полный любви и счастья! '
            },
            {
                image: 'images/photo_3.jpg',
                letter: 'images/photo_3.jpg',
                text: 'С тобой я чувствую себя дома, где бы мы ни были! 💖'
            },
            {
                image: 'images/photo_4.jpg',
                letter: 'images/photo_4.jpg',
                text: 'Твоя улыбка освещает мой путь даже в самые темные времена! 🌹'
            },
            {
                image: 'images/photo_5.jpg',
                letter: 'images/photo_5.jpg',
                text: 'Ты - причина, по которой я верю в магию! ✨'
            },
            {
                image: 'images/photo_9.jpg',
                letter: 'images/photo_9.jpg',
                text: 'Каждый день с тобой - это подарок! 💝'
            },
            {
                image: 'images/photo_10.jpg',
                letter: 'images/photo_10.jpg',
                text: 'Ты делаешь меня лучше каждый день! 💗'
            },
            {
                image: 'images/photo_11.jpg',
                letter: 'images/photo_11.jpg',
                text: 'Твое сердце - самое доброе, что я знаю! 💗'
            },
            {
                image: 'images/photo_7.jpg',
                letter: 'images/photo_7.jpg',
                text: 'С тобой каждый миг становится особенным! 🌸'
            },
            {
                image: 'images/photo_12.jpg',
                letter: 'images/photo_12.jpg',
                text: 'Ты - мое самое прекрасное приключение! 🌺'
            },
            {
                image: 'images/photo_14.jpg',
                letter: 'images/photo_14.jpg',
                text: 'Твоя любовь вдохновляет меня на подвиги! 💫'
            },
            {
                image: 'images/photo_13.jpg',
                letter: 'images/photo_13.jpg',
                text: 'Ты - моя мечта, ставшая реальностью! 🌙'
            },
            {
                image: 'images/photo_8.jpg',
                letter: 'images/photo_8.jpg',
                text: 'С тобой я нашел свое счастье! 💞'
            },
            {
                image: 'images/photo_6.jpg',
                letter: 'images/photo_6.jpg',
                text: 'Ты - самое дорогое, что у меня есть! 💎'
            },
            {
                image: 'images/photo_15.jpg',
                letter: 'images/photo_15.jpg',
                text: 'Я благодарен судьбе за тебя! 🌟'
            }
        ];

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        const imageData = shuffleArray(allImageData).slice(0, 14);

        // ===== СОЗДАНИЕ СЕРДЦА =====
        function createHeartParticles() {
            const particlesGeometry = new THREE.BufferGeometry();
            const particlesCount = 3000;
            const posArray = new Float32Array(particlesCount * 3);
            const colorArray = new Float32Array(particlesCount * 3);

            for(let i = 0; i < particlesCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                const z = 0;
                
                const scale = 0.3;
                const offsetX = (Math.random() - 0.5) * 2;
                const offsetY = (Math.random() - 0.5) * 2;
                const offsetZ = (Math.random() - 0.5) * 3;

                posArray[i * 3] = x * scale + offsetX;
                posArray[i * 3 + 1] = y * scale + offsetY;
                posArray[i * 3 + 2] = offsetZ;

                const colorChoice = Math.random();
                if(colorChoice > 0.6) {
                    colorArray[i * 3] = 1;
                    colorArray[i * 3 + 1] = 0.4;
                    colorArray[i * 3 + 2] = 0.7;
                } else if(colorChoice > 0.3) {
                    colorArray[i * 3] = 1;
                    colorArray[i * 3 + 1] = 0.1;
                    colorArray[i * 3 + 2] = 0.3;
                } else {
                    colorArray[i * 3] = 1;
                    colorArray[i * 3 + 1] = 0.9;
                    colorArray[i * 3 + 2] = 0.5;
                }
            }

            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            const particlesMaterial = new THREE.PointsMaterial({
                size: 0.8,
                vertexColors: true,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                sizeAttenuation: true
            });

            const heartParticles = new THREE.Points(particlesGeometry, particlesMaterial);
            heartParticles.name = 'heart';
            
            return heartParticles;
        }

        const heart = createHeartParticles();
        scene.add(heart);

        // ===== СОЗДАНИЕ ФОНА ВСЕЛЕННОЙ С АНИМАЦИЕЙ ВЗРЫВА =====
        let explosionProgress = 0;
        const explosionDuration = 2500; // 2.5 секунды
        let explosionStartTime = null;
        let isExploding = true;

        function createUniverseBackground() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 5000;
            const posArray = new Float32Array(starsCount * 3);
            const targetArray = new Float32Array(starsCount * 3); // Финальные позиции

            // Инициализация: все звезды в центре (точка взрыва)
            for(let i = 0; i < starsCount; i++) {
                // Начальная позиция - центр с небольшим разбросом
                posArray[i * 3] = (Math.random() - 0.5) * 2;
                posArray[i * 3 + 1] = (Math.random() - 0.5) * 2;
                posArray[i * 3 + 2] = (Math.random() - 0.5) * 2;
                
                // Финальная позиция - случайная точка в сфере
                const radius = 100 + Math.random() * 200;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                targetArray[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                targetArray[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                targetArray[i * 3 + 2] = radius * Math.cos(phi);
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            starsGeometry.userData = { targetPositions: targetArray }; // Сохраняем финальные позиции

            const starsMaterial = new THREE.PointsMaterial({
                size: 1.5,
                color: 0xffffff,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });

            const stars = new THREE.Points(starsGeometry, starsMaterial);
            stars.name = 'universe';
            
            return stars;
        }

        const universe = createUniverseBackground();
        scene.add(universe);

        // ===== ФУНКЦИЯ АНИМАЦИИ ВЗРЫВА =====
        function animateExplosion(progress) {
            const positions = universe.geometry.attributes.position.array;
            const targets = universe.geometry.userData.targetPositions;
            const heartPositions = heart.geometry.attributes.position.array;
            
            // Easing функция для плавности (ease-out cubic)
            const eased = 1 - Math.pow(1 - progress, 3);
            
            // Анимация звезд вселенной
            for(let i = 0; i < positions.length; i += 3) {
                // Интерполяция от центра к финальной позиции
                positions[i] = targets[i] * eased;
                positions[i + 1] = targets[i + 1] * eased;
                positions[i + 2] = targets[i + 2] * eased;
            }
            universe.geometry.attributes.position.needsUpdate = true;
            
            // Анимация сердца (тоже разлетается и собирается)
            const heartScale = eased;
            heart.scale.set(heartScale, heartScale, heartScale);
        }

        // ===== СОЗДАНИЕ СПРАЙТОВ С КАРТИНКАМИ =====
        const sprites = [];
        const textureLoader = new THREE.TextureLoader();
        let spritesCreated = false;

        function createSprite(data, orbitRadius, angle) {
            textureLoader.load(
                data.image,
                function(texture) {
                    const material = new THREE.SpriteMaterial({ 
                        map: texture,
                        transparent: true,
                        opacity: 0, // Начинаем с прозрачности 0
                        depthTest: false
                    });
                    
                    const sprite = new THREE.Sprite(material);
                    sprite.scale.set(12, 12, 1);
                    
                    const x = Math.cos(angle) * orbitRadius;
                    const y = Math.sin(angle) * orbitRadius;
                    const z = (Math.random() - 0.5) * 20;
                    
                    sprite.position.set(x, y, z);
                    
                    sprite.userData = {
                        orbitRadius: orbitRadius,
                        angle: angle,
                        speed: 0.001 + Math.random() * 0.002,
                        yOffset: (Math.random() - 0.5) * 10,
                        letterImage: data.letter,
                        letterText: data.text,
                        isHovered: false,
                        targetOpacity: 0.9
                    };
                    
                    scene.add(sprite);
                    sprites.push(sprite);
                },
                undefined,
                function(err) {
                    console.error('Ошибка загрузки:', data.image);
                }
            );
        }

        function createImageOrbits() {
            const orbitsData = [
                { radius: 30, count: 7 },
                { radius: 45, count: 7 },
            ];

            let dataIndex = 0;
            orbitsData.forEach(orbitData => {
                for(let i = 0; i < orbitData.count; i++) {
                    const angle = (i / orbitData.count) * Math.PI * 2;
                    const data = imageData[dataIndex % imageData.length];
                    createSprite(data, orbitData.radius, angle);
                    dataIndex++;
                }
            });
        }

        // ===== ФУНКЦИЯ ПОЯВЛЕНИЯ КАРТИНОК ПОСЛЕ ВЗРЫВА =====
        function fadeInSprites() {
            sprites.forEach((sprite, index) => {
                // Плавное появление с задержкой для каждого спрайта
                setTimeout(() => {
                    const fadeIn = () => {
                        if (sprite.material.opacity < sprite.userData.targetOpacity) {
                            sprite.material.opacity += 0.05;
                            requestAnimationFrame(fadeIn);
                        } else {
                            sprite.material.opacity = sprite.userData.targetOpacity;
                        }
                    };
                    fadeIn();
                }, index * 100); // Задержка 100мс между каждым спрайтом
            });
        }

        // ===== ОБРАБОТКА ВЗАИМОДЕЙСТВИЙ =====
        function handleInteraction(clientX, clientY) {
            if (document.getElementById('modal').classList.contains('active')) return;
            
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(sprites);

            if (intersects.length > 0) {
                const sprite = intersects[0].object;
                const data = sprite.userData;
                openModal(data.letterImage, data.letterText);
            }
        }

        function onMouseClick(event) {
            handleInteraction(event.clientX, event.clientY);
        }

        let touchStartTime = 0;
        let touchStartX = 0;
        let touchStartY = 0;

        function onTouchStart(event) {
            if (event.touches.length === 1) {
                touchStartTime = Date.now();
                touchStartX = event.touches[0].clientX;
                touchStartY = event.touches[0].clientY;
            }
        }

        function onTouchEnd(event) {
            const touchDuration = Date.now() - touchStartTime;
            const touchEndX = event.changedTouches[0].clientX;
            const touchEndY = event.changedTouches[0].clientY;
            
            const deltaX = Math.abs(touchEndX - touchStartX);
            const deltaY = Math.abs(touchEndY - touchStartY);
            
            if (touchDuration < 300 && deltaX < 10 && deltaY < 10) {
                handleInteraction(touchEndX, touchEndY);
            }
        }

        function onMouseMove(event) {
            if (document.getElementById('modal').classList.contains('active')) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(sprites);

            sprites.forEach(sprite => {
                if(sprite.userData.isHovered) {
                    sprite.scale.set(12, 12, 1);
                    sprite.material.opacity = 0.9;
                    sprite.userData.isHovered = false;
                }
            });

            if (intersects.length > 0) {
                const sprite = intersects[0].object;
                sprite.scale.set(14, 14, 1);
                sprite.material.opacity = 1;
                sprite.userData.isHovered = true;
                document.body.classList.add('pointer');
            } else {
                document.body.classList.remove('pointer');
            }
        }

        // ===== МОДАЛЬНОЕ ОКНО =====
        const modal = document.getElementById('modal');
        const modalImage = document.getElementById('modal-image');
        const modalText = document.getElementById('modal-text');
        const modalClose = document.getElementById('modal-close');

        function openModal(imageSrc, text) {
            modalImage.src = imageSrc;
            modalText.textContent = text;
            modal.classList.add('active');
            controls.enabled = false;
        }

        function closeModal() {
            modal.classList.remove('active');
            controls.enabled = true;
        }

        modalClose.addEventListener('click', closeModal);
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // ===== ОСНОВНОЙ ЦИКЛ АНИМАЦИИ =====
        function animate(timestamp) {
            requestAnimationFrame(animate);

            // Анимация взрыва
            if (isExploding) {
                if (!explosionStartTime) {
                    explosionStartTime = timestamp;
                }

                const elapsed = timestamp - explosionStartTime;
                explosionProgress = Math.min(elapsed / explosionDuration, 1);

                animateExplosion(explosionProgress);

                if (explosionProgress >= 1) {
                    isExploding = false;
                    controls.enabled = true; // Включаем управление
                    
                    // Запускаем появление картинок
                    if (!spritesCreated && sprites.length > 0) {
                        spritesCreated = true;
                        fadeInSprites();
                    }
                }
            }

            // Обычная анимация после взрыва
            if (!isExploding) {
                const elapsedTime = performance.now() / 1000;
                
                // Пульсация сердца
                const pulseScale = 1 + Math.sin(elapsedTime * 3) * 0.05;
                heart.scale.set(pulseScale, pulseScale, pulseScale);

                // Вращение вселенной
                universe.rotation.y = elapsedTime * 0.02;

                // Движение спрайтов
                sprites.forEach(sprite => {
                    const data = sprite.userData;
                    data.angle += data.speed;
                    
                    sprite.position.x = Math.cos(data.angle) * data.orbitRadius;
                    sprite.position.y = Math.sin(data.angle) * data.orbitRadius + data.yOffset;
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // ===== ОБРАБОТЧИКИ СОБЫТИЙ =====
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('click', onMouseClick);
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('touchstart', onTouchStart, { passive: true });
        window.addEventListener('touchend', onTouchEnd, { passive: true });

        // ===== ЗАПУСК =====
        createImageOrbits();
        animate(0);
    </script>
</body>
</html>
